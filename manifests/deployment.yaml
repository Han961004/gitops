apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-deployment
  labels:
    app: django
spec:
  replicas: 3
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
    spec:
      containers:
      - name: django
        # Docker Hub에 푸시한 이미지 경로를 지정합니다.
        image: docker.io/donghk77454/django-app:latest
        ports:
        - containerPort: 8000
